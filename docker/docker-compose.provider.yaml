name: stationery-provider

networks:
  stationery-nw:
    driver: bridge
    name: stationery-nw

services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./docker_data/mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - stationery-nw

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_server
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stationery-app
    ports:
      - '5432:5432'
    volumes:
      - ./docker_data/postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    networks:
      - stationery-nw

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - ./docker_data/pgadmin_data:/var/lib/pgadmin
    networks:
      - stationery-nw
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ./docker_data/ollama_data:/root/.ollama
    gpus: all
    networks:
      - stationery-nw

  kafka:
    container_name: kafka_server
    image: bitnamilegacy/kafka
    networks:
      - stationery-nw
    ports:
      - 9092:9092 # internal Docker network listener (optionally)
      - 29092:29092 # external listener, host local connect
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - ./docker_data/kafka_data/bitnami_data:/bitnami/kafka
    restart: unless-stopped
