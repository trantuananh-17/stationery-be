syntax = "proto3";

package GRPC_ORDER_SERVICE;

service OrderService {
  rpc checkout (CheckoutRequest) returns (CheckoutResponse);
}

message CheckoutAddress {
  string first_name = 1;
  string last_name = 2;
  optional string company = 3;
  string address1 = 4;
  optional string address2 = 5;
  string city = 6;
  optional string phone = 10;
}

message CheckoutRequest {
  string user_id = 1;
  string email = 2;
  CheckoutAddress shipping_address = 3;
  CheckoutAddress billing_address = 4;
  string payment_method = 5;
  optional string notes = 6;
  optional string coupon_code = 7;
}

message CheckoutStockItem {
  string variant_id = 1;
  int32 requested_quantity = 2;
  bool success = 3;
  string status = 4;
  int32 available_stock = 5;
  optional string message = 6;
  int32 remaining_stock = 7;
}

message CheckoutResponse {
  bool success = 1;

  optional string code = 2;
  optional string message = 3;

  optional string order_id = 4;
  optional string order_number = 5;
  int32 subtotal = 6;
  int32 total = 7;
  optional string status = 8;
  optional string payment_status = 9;

  repeated CheckoutStockItem stock_items = 10;
}