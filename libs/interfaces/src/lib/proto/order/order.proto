syntax = "proto3";

package GRPC_ORDER_SERVICE;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service OrderService {
  rpc checkout (CheckoutRequest) returns (CheckoutResponse);
  rpc getOrderPayment (GetOrderPaymentRequest) returns (OrderPaymentResponse);
  rpc getOrdersAdmin (GetOrdersAdminRequest) returns (OrdersAdminResponse);
  rpc getOrder (GetOrderRequest) returns (OrderDetailResponse);
  rpc getMyOrder (GetOrderRequest) returns (OrderDetailResponse);
  rpc updateOrderStatus (UpdateOrderStatusRequest) returns (google.protobuf.Empty);
  rpc getOrdersByUserId (GetOrdersByUserIdRequest) returns (OrdersByUserIdResponse);
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrdersByUserIdRequest {
  string user_id = 1;
  optional string status = 2;
  optional int32 page = 3;
  optional int32 limit = 4;
}

message OrdersByUserIdResponse {
  repeated CustomerOrderDetailResponse data = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message CustomerOrderDetailResponse {
  string id = 1;
  string order_number = 2;
  string status = 3;
  string payment_status = 4;
  string payment_method = 5;

  int32 subtotal = 6;
  int32 shipping_cost = 7;
  int32 discount = 8;
  int32 total = 9;

  optional string tracking_number = 10;
  optional string shipping_provider = 11;

  CheckoutAddress shipping_address = 12;
  repeated OrderDetailItemResponse items = 13;

  int32 total_items = 14;
  int32 total_unique_items = 15;

  google.protobuf.Timestamp estimated_delivery = 16;
  google.protobuf.Timestamp paid_at = 17;
  google.protobuf.Timestamp shipped_at = 18;
  google.protobuf.Timestamp delivered_at = 19;
  google.protobuf.Timestamp cancelled_at = 20;
  google.protobuf.Timestamp created_at = 21;
}

message OrderDetailResponse {
  string id = 1;
  string order_number = 2;
  string user_id = 3;
  string customer_email = 4;
  string status = 5;
  string payment_status = 6;
  string payment_method = 7;
  optional string payment_transaction_id = 8;
  optional string payment_provider = 9;
  int32 subtotal = 10;
  int32 tax = 11;
  int32 shipping_cost = 12;
  int32 discount = 13;
  int32 total = 14;
  optional string notes = 15;
  optional string tracking_number = 16;
  optional string shipping_provider = 17;
  CheckoutAddress shipping_address = 18;
  CheckoutAddress billing_address = 19;
  repeated OrderDetailItemResponse items = 20;
  int32 total_items = 21;
  int32 total_unique_items = 22;
  google.protobuf.Timestamp payment_expired_at = 23;
  google.protobuf.Timestamp paid_at = 24;
  google.protobuf.Timestamp shipped_at = 25;
  google.protobuf.Timestamp delivered_at = 26;
  google.protobuf.Timestamp cancelled_at = 27;
  google.protobuf.Timestamp estimated_delivery = 28;
  google.protobuf.Timestamp created_at = 29;
  google.protobuf.Timestamp updated_at = 30;
}

message OrderDetailItemResponse {
  string id = 1;
  string product_id = 2;
  optional string variant_id = 3;
  string name = 4;
  optional string sku = 5;
  optional string image = 6;
  int32 price = 7;
  int32 quantity = 8;
  int32 subtotal = 9;
  repeated OrderItemAttributeResponse attributes = 10;
}

message OrderItemAttributeResponse {
  string name = 1;
  string value = 2;
}

message GetOrdersAdminRequest {
  optional string search = 1;  
  optional string status = 2;
  optional string order_by = 3;
  optional int32 page = 4;
  optional int32 limit = 5;
}

message OrdersAdminResponse {
  repeated OrderItemByAdminResponse data = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message OrderItemByAdminResponse {
  string id = 1;
  string order_number = 2;
  string customer_name = 3;
  string customer_email = 4;
  string product_name = 5;
  string status = 6;
  string payment_status = 7;
  int32 total = 8;

  google.protobuf.Timestamp created_at = 9;
}

message CheckoutAddress {
  string first_name = 1;
  string last_name = 2;
  optional string company = 3;
  string address1 = 4;
  optional string address2 = 5;
  string city = 6;
  optional string phone = 10;
}

message CheckoutRequest {
  string user_id = 1;
  string email = 2;
  CheckoutAddress shipping_address = 3;
  CheckoutAddress billing_address = 4;
  string payment_method = 5;
  optional string notes = 6;
  optional string coupon_code = 7;
}

message CheckoutStockItem {
  string variant_id = 1;
  int32 requested_quantity = 2;
  bool success = 3;
  string status = 4;
  int32 available_stock = 5;
  optional string message = 6;
  int32 remaining_stock = 7;
}

message CheckoutResponse {
  bool success = 1;

  optional string code = 2;
  optional string message = 3;

  optional string order_id = 4;
  optional string order_number = 5;
  int32 subtotal = 6;
  int32 total = 7;
  optional string status = 8;
  optional string payment_status = 9;

  repeated CheckoutStockItem stock_items = 10;
}

message GetOrderPaymentRequest {
  string user_id = 1;
  string order_id = 2;
}

message OrderPaymentLineItemDto {
  string productId = 1;      
  string variantId = 2;       
  string name = 3;             
  string sku = 4;               
  string image = 5;            
  float price = 6;             
  int32 quantity = 7;         
  float subtotal = 8;          
}

message OrderPaymentResponse {
  string orderId = 1;       
  string orderNumber = 2;      
  string userId = 3;           
  string email = 4;             
  int32 totalItems = 5;         
  repeated OrderPaymentLineItemDto lineItems = 6; 
  string status = 7;       
  string paymentStatus = 8; 
  float subtotal = 9;        
  float tax = 10;             
  float shippingCost = 11;    
  float discount = 12;          
  float total = 13;             
  google.protobuf.Timestamp paymentExpiredAt = 14; 
} 

message UpdateOrderStatusRequest{
  string orderId = 1;
  string status = 2;
}