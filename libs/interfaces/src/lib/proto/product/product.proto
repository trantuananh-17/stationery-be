syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

package GRPC_PRODUCT_SERVICE;

service ProductService {
  rpc getProductCartItem (ProductCartItemRequest) returns (ProductCartItemResponse);
  rpc reserveStock (ReserveStockRequest) returns (ReserveStockResponse);

  rpc createProduct (CreateProductRequest) returns (google.protobuf.Empty);
  rpc updateProduct (UpdateProductRequest) returns (ProductIdResponse);
  rpc deleteProduct(GetProductByIdRequest) returns (ProductMutationResponse);
  rpc restoreProduct(GetProductByIdRequest) returns (ProductMutationResponse);
  rpc getProductById (GetProductByIdRequest) returns (ProductInfoResponse);
  rpc getProductBySlug (GetProductBySlugRequest) returns (ProductInfoResponse);
  rpc getProducts (GetProductsRequest) returns (GetProductsResponse);
  rpc getProductsByAdmin (GetProductsByAdminRequest) returns (GetProductsResponse);

  rpc searchProductsForAdvisor (ProductSearchRequest) returns (ProductSearchResponse);
  
}

message ProductMutationResponse {
  string productId = 1;
}

/* ================= AI ================= */
message ProductSearchRequest {
  string keyword = 1;
  string audience = 2;
  string need = 3;
  string category = 4;
  string brand = 5;
  int32 budget_min = 6;
  int32 budget_max = 7;
  string sort_by = 8;
  int32 limit = 9;
  string advisor_intent = 10;
}

message Product {
  string id = 1;
  string product_name = 2;
  string slug = 3;

  string category_id = 4;
  string category_name = 5;

  string brand_id = 6;
  string brand_name = 7;

  string description = 8;
  string short_description = 9;
  string thumbnail = 10;

  string variant_id = 11;
  string variant_name = 12;
  string sku = 13;
  int32 price = 14;
  int32 compare_at_price = 15;
  int32 stock = 16;
  string variant_image = 17;

  bool featured = 18;
  string product_url = 19;
}

message ProductSearchResponse {
  repeated Product items = 1;
   int32 total = 2;
}

/* ================= CART ================= */

message ProductCartItemRequest {
  string variant_id = 1;
}

message ProductAttributeResponse {
  string name = 1;
  string value = 2;
}

message ProductCartItemResponse {
  string product_id = 1;
  string variant_id = 2;
  string product_name = 3;
  string product_slug = 4;
  string variant_name = 5;
  string sku = 6;
  string product_thumbnail = 7;
  optional string image_variant = 8;
  int32 price = 9;
  optional int32 compare_at_price = 10;
  repeated ProductAttributeResponse attributes = 11;
  int32 stock = 12;
}

/* ================= STOCK ================= */

message ReserveStockItemRequest {
  string variant_id = 1;
  int32 quantity = 2;
}

message ReserveStockRequest {
  repeated ReserveStockItemRequest items = 1;
}

message ReserveStockItemResponse {
  string variant_id = 1;
  int32 requested_quantity = 2;
  bool success = 3;
  string status = 4;
  int32 available_stock = 5;
  optional string message = 6;
  int32 remaining_stock = 7;
}

message ReserveStockResponse {
  bool success = 1;
  repeated ReserveStockItemResponse items = 2;
}

/* ================= PRODUCT CRUD REQUEST ================= */

message ProductInput {
  string name = 1;
  string description = 2;
  string short_description = 3;
  string category_id = 4;
  string brand_id = 5;
  repeated string images = 6;
  string thumbnail = 7;
  optional bool featured = 8;
  repeated string search_keywords = 9;
  optional string seo_title = 10;
  optional string seo_description = 11;
}

message SpecificationInput {
  string attribute_id = 1;
  string value = 2;
}

message VariantInput {
  string name = 1;
  int32 price = 2;
  int32 stock = 3;
  optional int32 compare_at_price = 4;
  optional string image = 5;
  optional int32 sort_order = 6;
  optional bool is_default = 7;
  repeated string attribute_value_ids = 8;
  repeated string attribute_value_slug = 9;
}

message CreateProductRequest {
  ProductInput product = 1;
  repeated SpecificationInput specifications = 2;
  repeated VariantInput variants = 3;
}

message UpdateProductInput {
  optional string name = 1;
  optional string description = 2;
  optional string short_description = 3;
  optional string category_id = 4;
  optional string brand_id = 5;
  repeated string images = 6;
  optional string thumbnail = 7;
  optional bool featured = 8;
  repeated string search_keywords = 9;
  optional string seo_title = 10;
  optional string seo_description = 11;
  optional string status = 12;

}

message UpdateSpecificationInput {
  optional string id = 1;
  optional string attribute_id = 2;
  optional string value = 3;
}

message UpdateVariantInput {
  optional string id = 1;
  optional string name = 2;
  optional int32 price = 3;
  optional int32 compare_at_price = 4;
  optional int32 stock = 5;
  optional string image = 6;
  optional int32 sort_order = 7;
  optional bool is_default = 8;
  repeated string attribute_value_ids = 9;
  repeated string attribute_value_slug = 10;
}

message UpdateProductRequest {
  string id = 1;
  optional UpdateProductInput product = 2;
  repeated UpdateSpecificationInput specifications = 3;
  repeated UpdateVariantInput variants = 4;
}

message GetProductByIdRequest {
  string id = 1;
}

message GetProductBySlugRequest {
  string slug = 1;
}

message GetProductsRequest {
  optional string search = 1;
  optional string category = 2;
  optional string brand = 3;
  optional string order_by = 4;
  optional int32 page = 5;
  optional int32 limit = 6;
}

message GetProductsByAdminRequest {
  optional string search = 1;
  optional string status = 2;
  optional string order_by = 3;
  optional int32 page = 4;
  optional int32 limit = 5;
}

/* ================= CREATE / UPDATE RESPONSE ================= */

message ProductResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string short_description = 5;
  string category_id = 6;
  string brand_id = 7;
  repeated string images = 8;
  string thumbnail = 9;
  bool featured = 10;
}

/* ================= GET PRODUCT BY ID RESPONSE ================= */

message ProductCategoryParentResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
}

message ProductCategoryResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  optional ProductCategoryParentResponse parent = 4;
}

message ProductBrandResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
}

message ProductVariantAttributeResponse {
  string attribute_id = 1;
  string attribute_name = 2;
  string attribute_value_id = 3;
  string attribute_value = 4;
  string attribute_value_slug = 5;
}

message ProductVariantResponse {
  string id = 1;
  string name = 2;
  optional string sku = 3;
  int32 price = 4;
  optional int32 compare_at_price = 5;
  int32 stock = 6;
  int32 reserved_stock = 7;
  optional string image = 8;
  int32 sort_order = 9;
  bool is_default = 10;
  bool is_available = 11;
  repeated ProductVariantAttributeResponse attributes = 12;
}

message ProductVariantOptionValueResponse {
  string id = 1;
  string value = 2;
}

message ProductVariantOptionResponse {
  string attribute_id = 1;
  string attribute_name = 2;
  repeated ProductVariantOptionValueResponse values = 3;
}

message ProductSpecificationResponse {
  string id = 1;
  string attribute_id = 2;
  string attribute_name = 3;
  string value = 4;
}

message ProductInfoResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string thumbnail = 4;
  repeated string images = 5;

  ProductCategoryResponse category = 6;
  ProductBrandResponse brand = 7;

  string description = 8;
  string short_description = 9;
  string status = 10;
  bool featured = 11;
  optional string seo_title = 12;
  optional string seo_description = 13;
  optional string base_name = 14;

  repeated ProductVariantResponse variants = 15;
  repeated ProductVariantOptionResponse variant_options = 16;
  repeated ProductSpecificationResponse specifications = 17;
}

message ProductIdResponse {
  string id = 1;
}

/* ================= GET PRODUCTS RESPONSE ================= */

message ProductItemResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string thumbnail = 4;
  repeated string images = 5;

  string description = 6;
  string sku = 7;
  string category = 8;
  string brand = 9;
  string status = 10;

  int32 price = 11;
  optional int32 compare_at_price = 12;
  int32 stock = 13;

  google.protobuf.Timestamp created_at = 14;
}

message GetProductsResponse {
  repeated ProductItemResponse items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}