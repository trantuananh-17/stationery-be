
syntax = "proto3";

package GRPC_AUTH_SERVICE;

import "user.proto";


service AuthorizerService {
  rpc registerUser (UserPayload) returns (UserResponse);
  rpc verifyUserToken (VerifyUserTokenRequest) returns (VerifyUserTokenResponse);
}

message UserPayload {
  string email = 1;
  string password = 2;
  string firstName = 3;
  string lastName = 4;
}

message UserResponse {
  string userId = 1;
}


message VerifyUserTokenRequest {
  string token = 1;
}

message VerifyUserTokenResponse {
  string code = 1;
  AuthorizeResponse data = 2;
  string error = 3;
}

message AuthorizeResponse {
  bool valid = 1;
  optional AuthorizedMetadata metadata = 2;
}

message JWTPayload {
  string iss = 1;
  string aud = 2;
  int32 iat = 3;
  int32 exp = 4;
  string sub = 5;
  string at_hash = 6;
  string sid = 7;
  string nonce = 8;
  bool isExpired = 9;
}

message AuthorizedMetadata {
  optional string userId = 1;
  optional User user = 2;
  repeated string permissions = 3;
  optional JWTPayload jwt = 4;
}


