
syntax = "proto3";

package GRPC_AUTH_SERVICE;


service AuthorizerService {
  rpc registerUser (UserPayload) returns (UserResponse);
  rpc loginUser (LoginPayload) returns (LoginResponse);
}

message LoginPayload {
  string email = 1; 
  string password = 2;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

message UserPayload {
  string email = 1;
  string password = 2;
  string firstName = 3;
  string lastName = 4;
}

message UserResponse {
  string userId = 1;
}



