syntax = "proto3";

package GRPC_NOTIFICATION_SERVICE;

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc createUser (CreateUserRequest) returns (UserIdResponse);
  rpc getUserAuth (UserAuthRequest) returns (UserAuthResponse);
  rpc getUser (GetUserAdminRequest) returns (UserAdminDetailGrpcDto);
  rpc getUsers (GetUsersAdminRequest) returns (UsersResponse);}

message GetUsersAdminRequest {
  optional string search = 1;  
  optional string order_by = 3;
  optional int32 page = 4;
  optional int32 limit = 5;
}

message UsersResponse {
  repeated UserGrpcDto data = 1;

  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message UserGrpcDto {
  string id = 1;
  string full_name = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  double total_price = 6;
  bool is_verified = 7;
  bool is_active = 8;
  int32 total_order = 9;

  google.protobuf.Timestamp created_at = 10;
}

message GetUserAdminRequest {
  string user_id = 1;
}

message LastOrderItemGrpcDto {
  string product_id = 1;
  optional string variant_id = 2;
  string name = 3;
  optional string thumbnail = 4;
  int32 quantity = 5;
  double subtotal = 6;
}

message LastOrderGrpcDto {
  string order_id = 1;
  string order_number = 2;
  double total_price = 3;
  string order_status = 4;
  string payment_status = 5;

  google.protobuf.Timestamp ordered_at = 6;

  repeated LastOrderItemGrpcDto items = 7;
}

message UserAdminDetailGrpcDto {
  string id = 1;
  string full_name = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  optional string phone = 6;
  optional string avatar = 7;
  optional string gender = 8;
  google.protobuf.Timestamp date_of_birth = 9;
  bool is_verified = 10;
  bool is_active = 11;
  int32 total_orders = 12;
  double amount_spent = 13;
  google.protobuf.Timestamp customer_since = 14;
  optional LastOrderGrpcDto last_order = 15;

  google.protobuf.Timestamp created_at = 16;
}

message UserAuthResponse {
  string userId = 1;
  string role = 2;

  repeated string permissions = 3;

  string firstName = 4;
  string lastName = 5;

  string avatar = 6;
  string email = 7;
}

message UserAuthRequest {
  string userId = 1;
}

message CreateUserRequest {
  string email = 1;
  string firstName = 2;
  string lastName = 3;
  string roleName = 4;
}

message UserIdResponse {
  string userId = 1;
}