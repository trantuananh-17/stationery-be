syntax = "proto3";

package GRPC_USER_SERVICE;

service UserService {
  rpc createUser (CreateUserRequest) returns (UserIdResponse);
}

message Role {
  string name = 1;
  string description = 2;
  repeated string permissions = 3;
}

message CreateUserRequest {
  string email = 1;
  string firstName = 2;
  string lastName = 3;
}

message UserIdResponse {
  string userId = 1;
}

message User {
  string _id = 1;
  string id = 2;
  string firstName = 3;
  string lastName = 4;
  string email = 5;
  repeated Role roles = 6; 
}

message UserResponse {
  string code = 1;
  User data = 2;
  string error = 3;
}

message UserById {
  string userId = 1;
}

