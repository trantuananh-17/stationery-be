syntax = "proto3";

package GRPC_USER_SERVICE;

service UserService {
  rpc createUser (CreateUserRequest) returns (UserIdResponse);
  rpc getUserAuth (UserAuthRequest) returns (UserAuthResponse);
}

message UserAuthResponse {
  string userId = 1;
  string role = 2;
  repeated string permissions = 3;
}

message UserAuthRequest {
  string userId = 1;
}

message CreateUserRequest {
  string email = 1;
  string firstName = 2;
  string lastName = 3;
  string roleName = 4;
}

message UserIdResponse {
  string userId = 1;
}

